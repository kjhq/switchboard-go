services:
  switchboard-go:
    image: ghcr.io/kjhq/switchboard-go:latest
    pull_policy: always
    ports:
      - "8080:8080"
    environment:
      - PROXY_API_KEY=${PROXY_API_KEY:?PROXY_API_KEY is required}
      - OPENCODE_GO_API_KEYS=${OPENCODE_GO_API_KEYS:-}
      - SWITCHBOARD_GO_CONFIG=/tmp/config.json
    restart: unless-stopped
