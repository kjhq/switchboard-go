services:
  switchboard-go:
    image: ghcr.io/kjhq/switchboard-go:latest
    pull_policy: always
    user: root
    ports:
      - "8080:8080"
    environment:
      - OPENCODE_GO_API_KEYS=${OPENCODE_GO_API_KEYS:-}
      - SWITCHBOARD_GO_CONFIG=/tmp/config.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/docker-compose.yml
      - ./config:/tmp
    restart: unless-stopped
